<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Agnes Tamara ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<audio id="bgMusic" loop>
    <source src="assets/musik/sore1.mp3" type="audio/mp3">
</audio>

<button class="music-btn" id="musicBtn">
    ♫ Our Song
</button>

<div class="floating-icons">

    <div class="hunt-item wrong">🌹</div>
    <div class="hunt-item wrong">🖤</div>
    <div class="hunt-item wrong">🌙</div>
    <div class="hunt-item wrong">💌</div>
    <div class="hunt-item wrong">✨</div>
    <div class="hunt-item wrong">🎀</div>
    <div class="hunt-item wrong">🥀</div>

    <div class="hunt-item secret" id="secretLove">
        🤍
    </div>

</div>

<div class="glass-card">

    <span class="small-title">
        FOR AGNES TAMARA
    </span>

    
    <div class="rose-center">
        🌹
    </div>

    <h1 id="typewriter"></h1>

    <p class="subtitle">

        Untuk seseorang yang selalu berhasil
        membuat dunia terasa lebih hangat.

    </p>

    <button id="startBtn">
        Begin The Journey
    </button>

    <p class="secret-hint" id="secretHint">
</p>

</div>

<div id="popup">

    <div class="popup-card">

        <h2 id="popupTitle"></h2>

        <p id="popupText"></p>

        <button id="popupClose">
            Oke ❤️
        </button>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
